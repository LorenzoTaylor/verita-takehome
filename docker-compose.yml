services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: billing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend-customer:
    build: ./frontend/customer
    ports:
      - "3000:80"
    depends_on:
      - backend

  frontend-ops:
    build: ./frontend/ops
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
